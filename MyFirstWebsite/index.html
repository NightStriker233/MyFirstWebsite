<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="#" class="nav-logo">✦ MySpace</a>
      <div class="nav-links">
        <a href="#intro">首页</a>
        <a href="#messages">留言板</a>
      </div>
    </div>
  </nav>

  <!-- Hero 介绍区 -->
  <section class="hero" id="intro">
    <div class="hero-bg"></div>
    <div class="container hero-content">
      <div class="hero-badge">欢迎来到我的小站</div>
      <h1 class="hero-title">Hi，我是 <span class="gradient-text">新手上路</span></h1>
      <p class="hero-subtitle">
        这是我亲手搭建的第一个网站，从零开始，一步一步走到这里。
        虽然还很简单，但每一步都是新的尝试。记录成长，分享点滴。
      </p>
      <div class="hero-cta">
        <a href="#messages" class="btn btn-primary">💬 给我留言</a>
      </div>
      <div class="hero-stats">
        <div class="stat-item">
          <span class="stat-number" id="totalMessages">0</span>
          <span class="stat-label">条留言</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">2026</span>
          <span class="stat-label">始于今年</span>
        </div>
      </div>
    </div>
  </section>

  <!-- 留言板区域 -->
  <section class="messages-section" id="messages">
    <div class="container">
      <div class="section-header">
        <h2>📝 留言板</h2>
        <p>留下你想说的话吧，每一条留言都是对我的鼓励</p>
      </div>

      <!-- 留言表单 -->
      <div class="message-form-card">
        <h3>写留言</h3>
        <form id="messageForm">
          <div class="form-group">
            <input type="text" id="nameInput" class="form-input" placeholder="你的名字" maxlength="50" required>
          </div>
          <div class="form-group">
            <textarea id="contentInput" class="form-input form-textarea" placeholder="写下你想说的话……" maxlength="500" required></textarea>
            <span class="char-counter"><span id="charCount">0</span>/500</span>
          </div>
          <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
            <span class="btn-text">提交留言</span>
            <span class="btn-loading" style="display:none">提交中…</span>
          </button>
        </form>
        <div id="formFeedback" class="form-feedback" style="display:none"></div>
      </div>

      <!-- 留言列表 -->
      <div class="messages-list" id="messagesList">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>加载留言中…</p>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 MySpace. 用 ❤️ 搭建</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
